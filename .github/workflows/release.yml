name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run: build and validate, but skip upload"
        required: false
        default: "true"
        type: boolean

permissions:
  contents: read
  id-token: write   # for PyPI trusted publishing

jobs:
  build:
    name: Build & validate distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Verify __version__ matches tag
        if: github.event_name == 'push'
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          VERSION=$(python -c "import re, pathlib; \
            text = pathlib.Path('src/molforge/__init__.py').read_text(); \
            m = re.search(r'__version__\s*=\s*[\"\']([^\"\']+)[\"\']', text); \
            print(m.group(1) if m else '')")
          echo "Tag version:  $TAG"
          echo "__version__:  $VERSION"
          if [ "$TAG" != "$VERSION" ]; then
            echo "ERROR: Tag (v$TAG) does not match __version__ ($VERSION)"
            echo "Update src/molforge/__init__.py before tagging."
            exit 1
          fi

      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade pip build
          python -m build

      - name: Validate distribution with twine check
        run: |
          pip install twine
          twine check dist/*

      - name: Smoke-test wheel install
        run: |
          python -m venv /tmp/release-smoke
          /tmp/release-smoke/bin/pip install --upgrade pip
          /tmp/release-smoke/bin/pip install dist/*.whl
          /tmp/release-smoke/bin/python -c "import molforge; print(f'Smoke-test OK: molforge {molforge.__version__}')"

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    # Skip the publish step entirely in workflow_dispatch dry-runs.
    if: github.event_name == 'push' || inputs.dry_run == false
    environment:
      name: pypi
      url: https://pypi.org/p/molforge
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
