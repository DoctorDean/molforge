name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install dev deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Ruff (lint)
        run: ruff check .
      - name: Ruff (format check)
        run: ruff format --check .

  typecheck:
    name: Type check (mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Mypy (strict)
        # The entire src/ tree is mypy --strict clean. This gate
        # enforces that it stays that way. The mypy config already
        # sets strict = true, so `mypy src` is a strict check.
        run: mypy src

  test:
    name: Tests (Python ${{ matrix.python-version }} on ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Run tests
        run: pytest -m "not slow and not integration" --cov=molforge --cov-report=xml
      - name: Upload coverage
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          fail_ci_if_error: false

  benchmark:
    name: Benchmarks
    runs-on: ubuntu-latest
    # Non-blocking: the benchmarks are exercised on every push so a
    # broken benchmark (or a function it calls) is caught, but timing
    # numbers on shared CI runners are too noisy to gate the build on.
    # For real regression tracking, run locally with
    #   pytest -m benchmark --benchmark-save=baseline
    # and compare against the saved baseline.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Run benchmarks
        run: pytest -m benchmark --benchmark-columns=min,mean,stddev,rounds

  build:
    name: Build sdist & wheel
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Build
        run: |
          python -m pip install --upgrade pip build
          python -m build
      - name: Check distributions with twine
        run: |
          pip install twine
          twine check dist/*
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  smoke-install:
    name: Smoke-test wheel install (clean env)
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Install the built wheel in a clean venv
        run: |
          python -m venv /tmp/smoke-env
          /tmp/smoke-env/bin/pip install --upgrade pip
          /tmp/smoke-env/bin/pip install dist/*.whl
          /tmp/smoke-env/bin/pip install pytest pytest-cov
      - name: Verify import + version
        run: |
          /tmp/smoke-env/bin/python -c "import molforge; print(f'Installed: molforge {molforge.__version__}')"
          /tmp/smoke-env/bin/python -c "from molforge.io import load, save; from molforge.sequence import align; from molforge.structure import rmsd, dssp_3state, sasa, phi_psi_omega; from molforge.wrappers.folding import ESMFold; from molforge.wrappers.docking import Vina; print('All public symbols importable')"
      - name: Run tests against installed wheel
        run: |
          /tmp/smoke-env/bin/pytest tests/ -m "not slow and not integration" -q --no-header

  notebooks:
    name: Execute runnable notebooks
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install nbclient ipykernel
      - name: Parse-validate every notebook + execute runnable ones
        run: python scripts/execute_notebooks.py
